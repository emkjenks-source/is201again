<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connections Game</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f7e8ff;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-top: 10px;
    }

    #gameBoard {
        display: grid;
        grid-template-columns: repeat(4, 150px);
        gap: 10px;
        justify-content: center;
        margin-top: 30px;
    }

    .tile {
        background-color: white;
        border: 2px solid #b57edc;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    .tile.selected {
        background-color: #d8b4ff;
    }

    /* Category colors */
    .cat1 { background-color: #ffb3c6 !important; border-color: #ff4d6d !important; }
    .cat2 { background-color: #baffc9 !important; border-color: #2ecc71 !important; }
    .cat3 { background-color: #bae1ff !important; border-color: #3498db !important; }
    .cat4 { background-color: #fff3b0 !important; border-color: #f1c40f !important; }

    #message {
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
    }

    #chances {
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    #playAgain {
        margin-top: 20px;
        padding: 12px 25px;
        background-color: #b57edc;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        display: none;
    }

    #playAgain:hover {
        background-color: #9d5bd1;
    }
</style>
</head>

<body>

<h1>Connections Game</h1>

<div id="gameBoard"></div>

<div id="chances">Chances Left: 5</div>
<div id="message"></div>

<button id="playAgain">Play Again</button>

<script>

// MASTER LIST OF MANY WORDS TO RANDOMIZE FROM
const wordBank = {
    Fruits: ["Apple", "Banana", "Orange", "Grape", "Pear", "Peach", "Mango", "Kiwi"],
    Animals: ["Dog", "Cat", "Horse", "Lion", "Tiger", "Zebra", "Bear", "Wolf"],
    Colors: ["Red", "Blue", "Green", "Yellow", "Purple", "Pink", "Black", "White"],
    Sports: ["Soccer", "Tennis", "Basketball", "Baseball", "Hockey", "Golf", "Volleyball", "Rugby"],
    Music: ["Piano", "Guitar", "Drums", "Violin", "Flute", "Trumpet", "Cello", "Harp"],
    Weather: ["Rain", "Snow", "Wind", "Fog", "Hail", "Storm", "Cloud", "Sun"],
    School: ["Math", "Science", "History", "English", "Art", "Music", "PE", "Lunch"]
};

let categories = {};
let selectedTiles = [];
let wrongGuesses = 0;
let solvedCategories = 0;

const board = document.getElementById("gameBoard");
const message = document.getElementById("message");
const chancesDisplay = document.getElementById("chances");
const playAgainBtn = document.getElementById("playAgain");

function getRandomCategories() {
    const keys = Object.keys(wordBank);
    const chosen = [];

    while (chosen.length < 4) {
        let pick = keys[Math.floor(Math.random() * keys.length)];
        if (!chosen.includes(pick)) chosen.push(pick);
    }

    // Build categories with 4 random words each
    categories = {};
    chosen.forEach((cat, i) => {
        categories[cat] = {
            words: shuffle(wordBank[cat]).slice(0, 4),
            class: "cat" + (i + 1)
        };
    });
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function startGame() {
    board.innerHTML = "";
    message.textContent = "";
    playAgainBtn.style.display = "none";

    wrongGuesses = 0;
    solvedCategories = 0;
    selectedTiles = [];

    chancesDisplay.textContent = "Chances Left: 5";

    getRandomCategories();

    let words = Object.values(categories).map(c => c.words).flat();
    words = shuffle(words);

    words.forEach(word => {
        const tile = document.createElement("div");
        tile.classList.add("tile");
        tile.textContent = word;

        tile.addEventListener("click", () => selectTile(tile));
        board.appendChild(tile);
    });
}

function selectTile(tile) {
    if (tile.classList.contains("correct")) return;
    if (selectedTiles.includes(tile)) return;

    tile.classList.add("selected");
    selectedTiles.push(tile);

    if (selectedTiles.length === 4) {
        checkSelection();
    }
}

function checkSelection() {
    const selectedWords = selectedTiles.map(t => t.textContent);
    let isCorrect = false;

    for (let category in categories) {
        const group = categories[category].words;

        if (group.every(word => selectedWords.includes(word))) {
            isCorrect = true;

            selectedTiles.forEach(tile => {
                tile.classList.remove("selected");
                tile.classList.add("correct");
                tile.classList.add(categories[category].class);
                tile.style.pointerEvents = "none";
                tile.style.opacity = "0.7";
            });

            solvedCategories++;

            if (solvedCategories === 4) {
                message.textContent = "Great Job you did it.";
                playAgainBtn.style.display = "inline-block";
            }
        }
    }

    if (!isCorrect) {
        wrongGuesses++;
        chancesDisplay.textContent = "Chances Left: " + (5 - wrongGuesses);

        selectedTiles.forEach(tile => tile.classList.remove("selected"));

        if (wrongGuesses >= 5) {
            message.textContent = "You lose";
            disableAllTiles();
            playAgainBtn.style.display = "inline-block";
        }
    }

    selectedTiles = [];
}

function disableAllTiles() {
    document.querySelectorAll(".tile").forEach(tile => {
        tile.style.pointerEvents = "none";
    });
}

playAgainBtn.addEventListener("click", startGame);

// Start the first game
startGame();

</script>

</body>
</html>
